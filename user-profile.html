<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Perfil de Usuario — Mini App</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/map-styles.css">
  <link rel="stylesheet" href="assets/css/notifications.css">
  <script type="module" src="assets/js/auth-guard.js"></script>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body class="has-nav">
  <nav>
    <div class="nav-header">
      <span class="nav-logo">SYS</span>
      <button id="menu-toggle" class="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <div class="nav-links">
      <a href="index.html" class="nav-btn-home">Feed</a>
      <a href="map.html">Mapa</a>
      <a href="explorer.html">Explorer</a>
      <a href="storage-explorer.html">Storage</a>
      <a href="chat-personal.html" class="nav-btn-inbox">Inbox</a>
      <a href="chat.html" class="nav-btn-chat">Global</a>
      <a href="activity.html" class="nav-btn-activity">Actividad</a>
      <a href="profile.html" class="nav-btn-profile">Perfil</a>
    </div>
  </nav>

  <main class="container">
    <section class="profile-section">
      <div id="profile-capture-area" style="background: var(--bg); border-radius: 12px; padding: 4px;">
        <div id="profile-content" class="profile-card">
          <p class="loading">Cargando perfil...</p>
        </div>

        <!-- Mini-mapa de ubicación -->
        <div id="profile-map-section" style="display:none; margin-top: 16px; background: rgba(13,2,8,0.8); border: 1px solid var(--border, #ffb000); border-radius: 12px; padding: 16px; position: relative;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed rgba(255,176,0,0.2);">
            <i data-lucide="radar" style="width:18px; height:18px; color: var(--accent, #ffcc00);"></i>
            <span style="font-size: 0.85em; letter-spacing: 2px; text-transform: uppercase; color: var(--accent, #ffcc00);">Ubicación aproximada</span>
          </div>
          <div id="profile-map" style="height: 260px; border-radius: 8px; border: 1px solid rgba(255,176,0,0.2); overflow: hidden;"></div>
          <div id="distance-info" style="margin-top: 12px;"></div>
        </div>
      </div>

      <div class="profile-actions" style="margin-top: 24px;">
        <button id="back-btn" class="btn"><i data-lucide="arrow-left"></i> Volver</button>
        <button id="message-btn" class="btn"><i data-lucide="message-circle"></i> Enviar Mensaje</button>
        <button id="screenshot-btn" class="btn"><i data-lucide="camera"></i> Capturar perfil</button>
      </div>
    </section>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="assets/js/page-transitions.js"></script>
  <script type="module" src="assets/js/menu-toggle.js"></script>
  <script type="module" src="assets/js/notifications.js"></script>
  <script type="module" src="assets/js/user-profile.js"></script>
  <script type="module" src="assets/js/user-profile-screenshot.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    window.addEventListener('load', () => lucide.createIcons());
  </script>
</body>

</html>
