<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYSTEM Storage - Firebase Files</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/notifications.css">
  <script type="module" src="assets/js/auth-guard.js"></script>
  <style>
    .storage-container {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: calc(100vh - 64px);
      margin-top: 64px;
      background: var(--bg);
    }

    .storage-sidebar {
      border-right: 2px solid var(--border);
      padding: 16px;
      overflow-y: auto;
      background: var(--card);
    }

    .storage-main {
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .breadcrumb {
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: 'Courier New', Courier, monospace;
      color: var(--accent);
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 12px;
      border: 1px solid var(--border);
    }

    .breadcrumb-item {
      cursor: pointer;
    }

    .breadcrumb-item:hover {
      text-decoration: underline;
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
    }

    .file-item {
      border: 1px solid var(--border);
      background: var(--card);
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }

    .file-item:hover {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      transform: translateY(-2px);
    }

    .file-icon {
      font-size: 24px;
      color: var(--accent);
    }

    .file-name {
      font-size: 12px;
      text-align: center;
      word-break: break-all;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-actions {
      display: none;
      position: absolute;
      top: 0;
      right: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      z-index: 10;
    }

    .file-item:hover .file-actions {
      display: flex;
      flex-direction: column;
    }

    .action-btn {
      padding: 4px 8px;
      font-size: 10px;
      border: none;
      background: none;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }

    .action-btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .upload-zone {
      border: 2px dashed var(--border);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(var(--accent-rgb), 0.1);
    }

    #file-input {
      display: none;
    }

    /* Progress footer */
    .explorer-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 32px;
      background: var(--card);
      border-top: 2px solid var(--border);
      display: none;
      align-items: center;
      padding: 0 16px;
      z-index: 1300;
      font-size: 11px;
      color: var(--text);
      gap: 12px;
    }

    .explorer-footer.active {
      display: flex;
    }

    .progress-container {
      flex: 1;
      height: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      transition: width 0.3s ease;
    }
  </style>
</head>

<body class="has-nav">
  <nav>
    <div class="nav-header">
      <span class="nav-logo">SYSTEM CO</span>
      <button id="menu-toggle" class="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <div class="nav-links">
      <a href="index.html">Feed</a>
      <a href="map.html">Mapa</a>
      <a href="explorer.html">Explorer</a>
      <a href="storage-explorer.html" class="nav-active">Storage</a>
      <a href="chat-personal.html">Inbox</a>
      <a href="chat.html">Global</a>
      <a href="activity.html">Actividad</a>
      <a href="export.html">Exportar</a>
      <a href="profile.html">Perfil</a>
    </div>
  </nav>

  <main class="storage-container">
    <div class="storage-sidebar">
      <h3>_NAVIGATION</h3>
      <div id="folder-list" class="selectable-list">
        <!-- Folders will be listed here -->
      </div>
    </div>

    <div class="storage-main">
      <div class="breadcrumb" id="breadcrumb" style="display: flex; justify-content: space-between; align-items: center; padding-right: 12px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div id="breadcrumb-items" style="display: flex; align-items: center;">
            <span class="breadcrumb-item" data-path="fotos">fotos</span>
          </div>
          <button id="edit-path-btn" class="btn-small" style="margin-left: 12px; padding: 2px 6px; font-size: 10px; border-color: var(--secondary); color: var(--secondary);" title="Ingresar ruta manualmente">[ JUMP TO PATH ]</button>
        </div>
        <div class="search-mini" style="display: flex; align-items: center; gap: 8px; flex: 1; max-width: 400px; margin-left: 20px;">
          <span class="prompt-label" style="font-size: 14px; opacity: 0.7;">_FIND:</span>
          <input type="text" id="search-input" placeholder="buscar..." autocomplete="off" style="background: transparent; border: 1px solid var(--border); color: var(--accent); padding: 4px 8px; width: 100%; outline: none; font-family: 'Courier New', monospace;">
          <button id="deep-search-btn" class="btn-small" title="Escaneo Profundo (Recursivo)" style="white-space: nowrap; border-color: var(--secondary); color: var(--secondary);">[ DEEP SCAN ]</button>
        </div>
      </div>

      <div class="toolbar" style="display: flex; gap: 12px; align-items: center; justify-content: space-between;">
        <div style="display: flex; gap: 12px;">
          <button id="upload-btn" class="btn-small">SUBIR ARCHIVO</button>
          <button id="upload-url-btn" class="btn-small" style="border-color: var(--accent); color: var(--accent);" title="Subir desde un enlace web externo">SUBIR URL</button>
          <button id="create-folder-btn" class="btn-small">NUEVA CARPETA</button>
          <button id="refresh-btn" class="btn-small">ACTUALIZAR</button>
          <button id="export-csv-btn" class="btn-small" style="border-color: #4CAF50; color: #4CAF50;">EXPORTAR CSV</button>
        </div>
        <div id="storage-counters" style="font-family: 'Courier New', Courier, monospace; font-size: 12px; color: var(--secondary);">
          _ARCHIVOS: 0 | _CARPETAS: 0
        </div>
      </div>

      <div id="file-list" class="file-grid">
        <p class="loading">Iniciando búsqueda en datacenters...</p>
      </div>

      <div class="upload-zone" id="upload-zone">
        <p>ARRASTRA ARCHIVOS AQUÍ, PEGALOS CON <strong style="color:var(--accent);">CTRL+V</strong>, O HAZ CLIC PARA SUBIR</p>
        <input type="file" id="file-input" multiple>
      </div>
    </div>
  </main>

  <footer id="explorer-footer" class="explorer-footer">
    <span id="process-name">Cargando storage...</span>
    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <span id="progress-percent">0%</span>
  </footer>

  <!-- Image Preview Modal -->
  <div id="image-modal" class="retro-modal">
    <div class="modal-content">
      <div class="modal-header">
        <span>PREVISUALIZACIÓN DE ARCHIVO</span>
        <button id="close-modal" class="close-btn">[X]</button>
      </div>
      <div class="modal-body" style="justify-content: center; align-items: center; flex-direction: column; gap: 16px;">
        <img id="modal-img" src="" alt="Vista previa" style="max-width: 100%; max-height: 70vh; display: none;">
        <div id="file-info-preview" style="color: var(--accent); font-family: 'Courier New', Courier, monospace;"></div>
        <div class="scanlines"></div>
      </div>
      <div class="modal-footer" style="padding: 10px; display: flex; justify-content: flex-end; gap: 10px;">
        <button id="download-current" class="btn-small">DESCARGAR</button>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/page-transitions.js"></script>
  <script type="module" src="assets/js/menu-toggle.js"></script>
  <script type="module" src="assets/js/notifications.js"></script>
  <script type="module" src="assets/js/storage-explorer.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    window.addEventListener('load', () => lucide.createIcons());
  </script>
</body>

</html>
