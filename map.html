<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini App — Mapa de Usuaries</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/map-styles.css">
  <link rel="stylesheet" href="assets/css/notifications.css">
  <script type="module" src="assets/js/auth-guard.js"></script>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
</head>

<body class="has-nav map-page">
  <nav>
    <div class="nav-header">
      <span class="nav-logo">SYS</span>
      <button id="menu-toggle" class="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <div class="nav-links">
      <a href="index.html">Feed</a>
      <a href="map.html" class="nav-active">Mapa</a>
      <a href="explorer.html">Explorer</a>
      <a href="storage-explorer.html">Storage</a>
      <a href="chat-personal.html" class="nav-btn-inbox">Inbox</a>
      <a href="chat.html" class="nav-btn-chat">Global</a>
      <a href="activity.html" class="nav-btn-activity">Actividad</a>
      <a href="export.html" class="nav-btn-export">Exportar</a>
      <a href="profile.html" class="nav-btn-profile">Perfil</a>
    </div>
  </nav>

  <main id="main-content">
    <div class="map-layout">
      <div class="map-wrapper">
        <div id="map"></div>
        <div class="map-search-overlay">
          <div class="search-box">
            <i data-lucide="search"></i>
            <input type="text" id="map-search-input" placeholder="Buscar por alias o ID..." autocomplete="off">
            <button id="clear-search-btn" title="Borrar búsqueda"
              style="display:none; background:none; border:none; cursor:pointer; color:#aaa; font-size:18px; padding: 0 6px; line-height:1;">&#x2715;</button>
            <div id="search-results" class="search-results hidden"></div>
          </div>
          <div id="map-status" class="map-status">LISTO.</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Leaflet MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <script type="module" src="assets/js/page-transitions.js"></script>
  <script type="module" src="assets/js/menu-toggle.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="assets/js/notifications.js"></script>
  <script type="module" src="assets/js/map-view.js"></script>
  <script>
    window.addEventListener('load', () => lucide.createIcons());
  </script>
</body>

</html>
