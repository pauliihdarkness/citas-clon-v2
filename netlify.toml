[build]
  # Netlify instalará automáticamente las dependencias de los workspaces
  command = "npm run build --prefix react-app"
  publish = "react-app/dist"

[[redirects]]
  # Regla para manejar el enrutamiento de React (SPA)
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  # Asegurar que se usen las versiones correctas de Node/NPM si es necesario
  NODE_VERSION = "20"
